name: Security

# M5 (2026-05-25) — three defense-in-depth scans land in CI:
#   * gitleaks    — committed secrets / API keys / private keys.
#   * pip-audit   — Python deps with known CVEs.
#   * npm audit   — Node deps with known CVEs.
#
# Schedule: every push to main, every PR, plus a Monday-morning UTC
# cron so a CVE published in an existing pinned dep gets flagged
# without a code change forcing it.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 7 * * 1"   # Monday 07:17 UTC ≈ 01:17 CDMX
  workflow_dispatch:        # manual rerun from the Actions tab

# Don't pile up redundant scans when the same branch gets new commits.
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (committed secrets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # gitleaks scans the full git history, so fetch everything.
          # Without depth=0 the action only sees the most recent commit.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  pip-audit:
    name: pip-audit (Python deps)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install project + audit tool
        run: |
          python -m pip install --upgrade pip
          # Install the project so pip-audit can resolve the full
          # dependency tree (including transitive deps that aren't in
          # pyproject directly).
          pip install -e .
          pip install pip-audit==2.7.3

      - name: Audit
        # Audit the pinned lock directly (``-r requirements.lock``) — this
        # is the exact dependency set every deploy installs (render.yaml
        # uses ``-c requirements.lock``), and it sidesteps the
        # ``--local``/editable enumeration that errors on the editable
        # ``checkwise-backend`` itself. ``--strict`` fails on any
        # vulnerability — a loud alert, not a silent JSON file.
        # ``--ignore-vuln`` slots exist if a specific advisory is
        # verified non-applicable.
        run: |
          pip-audit \
            --requirement requirements.lock \
            --strict \
            --progress-spinner=off \
            --format=columns

  npm-audit:
    name: npm audit (Node deps)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit (fail on high or critical)
        # ``--audit-level=high`` makes npm exit non-zero only on the
        # severities that should block a release. Moderate findings
        # still appear in the job output but don't fail CI — keeps
        # the signal tight for a small team.
        run: npm audit --audit-level=high
