name: CodeQL

# Static application security testing (SAST) — CICD-1 / ISO 27002:2022 8.28.
# Complements the existing Security workflow (secret-scan + dependency-scan)
# with semantic code analysis: injection, path traversal, unsafe deserialization,
# hardcoded-credential, and SSRF patterns across the Python backend and the
# TypeScript/JavaScript frontend. GitHub-native and free for this repo.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 7 * * 1" # Monday 07:23 UTC ≈ 01:23 CDMX (after the dep scan)
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write # required to upload results to the Security tab
    strategy:
      fail-fast: false
      matrix:
        language: ["python", "javascript-typescript"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      # CheckWise is interpreted (Python + TS); no compiled artifact to build,
      # so autobuild is a no-op safety net rather than a real build step.
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
