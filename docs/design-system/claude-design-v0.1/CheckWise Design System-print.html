<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>CheckWise · Design System v0.1 (Print)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

  <link rel="icon" type="image/svg+xml" href="assets/checkwise-mark.svg"/>

  <link rel="stylesheet" href="tokens.css"/>
  <link rel="stylesheet" href="base.css"/>
  <link rel="stylesheet" href="primitives.css"/>
  <link rel="stylesheet" href="patterns.css"/>

  <style>
    /* ============================================================
       PRINT OVERRIDES
       Make a long-scrolling React doc behave like a printed report.
       ============================================================ */

    /* Force the screen layout to single column even before print. */
    .app {
      display: block !important;
      grid-template-columns: 1fr !important;
    }
    .sidebar, .topbar { display: none !important; }
    .main { min-width: 0; }

    /* Force colors to print (Chrome / WebKit / Firefox) */
    html, body, * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }

    /* Section padding — tighter on paper than on screen */
    .section { padding: 28px 32px !important; scroll-margin-top: 0 !important; }
    .section.hero { padding: 32px 32px 40px !important; }

    /* Restore any clipped content so nothing is hidden */
    body, html, .main, .section, .section-inner { overflow: visible !important; }
    .proto-frame { overflow: visible !important; box-shadow: none !important; }
    .extract-body { max-height: none !important; overflow: visible !important; }
    .dash-main { overflow: visible !important; }

    /* Remove all motion */
    *, *::before, *::after {
      animation: none !important;
      transition: none !important;
    }

    /* Stop content from being clipped by viewport-sized rules */
    .dash { min-height: 0 !important; }
    .upload-pad { min-height: 0 !important; }
    .onb { min-height: 0 !important; }
    .doc-canvas { min-height: 0 !important; }

    /* Soften heavy shadows on paper */
    .card, .audit-card, .principle, .dash-panel, .stat,
    .token-card, .uploaded-row, .doc-preview, .extract-panel,
    .motion-card, .scale-row, .radius-item, .shadow-item,
    .alert, .upload-pad, .onb, .proto-frame {
      box-shadow: none !important;
    }

    /* Page rules */
    @page {
      size: Letter portrait;
      margin: 0.55in 0.5in;
    }

    @media print {
      body { background: white !important; }

      /* Each major section starts on its own page */
      .section { break-before: page; padding: 14px 0 !important; }
      .section.hero { break-before: auto; padding: 0 0 14px !important; }

      /* Avoid splitting inside individual artifacts */
      .audit-card,
      .principle,
      .token-card,
      .motion-card,
      .stat,
      .dash-panel,
      .card,
      .alert,
      .radius-item,
      .shadow-item,
      .bp-card,
      .uploaded-row,
      .extract-row,
      .scale-item,
      .choice,
      .onb-step {
        break-inside: avoid;
      }

      /* Heading should never be orphaned from its content */
      h1, h2, h3, h4 { break-after: avoid; }
      .section-head { break-after: avoid; }
      .subhead { break-after: avoid; }

      /* The prototype frames are large — let them flow */
      .proto-frame { break-inside: auto; }
      .dash, .upload-pad, .onb, .ocr-grid { break-inside: auto; }

      /* Sticky things go static */
      .sidebar, .topbar { display: none !important; }

      /* Tighter hero on paper */
      .hero-text h1 { font-size: 38px !important; }
      .section h2 { font-size: 28px !important; }

      /* Backdrop filters often misbehave when printing */
      .topbar { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="foundations.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="pattern-dashboard.jsx"></script>
  <script type="text/babel" src="pattern-upload-ocr.jsx"></script>
  <script type="text/babel" src="pattern-onboarding-responsive.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <!-- Auto-print after React has rendered, Babel finished, and fonts are loaded -->
  <script type="text/babel">
    (async () => {
      // Wait until React has mounted something into #root
      const waitForRender = () => new Promise((res) => {
        const check = () => {
          const root = document.getElementById("root");
          if (root && root.children.length > 0) res();
          else requestAnimationFrame(check);
        };
        check();
      });

      await waitForRender();

      // Wait for web fonts
      if (document.fonts && document.fonts.ready) {
        try { await document.fonts.ready; } catch (e) {}
      }

      // Small settle delay so charts/SVGs have time to lay out
      await new Promise(r => setTimeout(r, 700));

      window.print();
    })();
  </script>
</body>
</html>
