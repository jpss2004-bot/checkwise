services:
  postgres:
    image: postgres:16-alpine
    container_name: checkwise-postgres
    environment:
      POSTGRES_DB: checkwise
      POSTGRES_USER: checkwise
      POSTGRES_PASSWORD: checkwise
    ports:
      - "5432:5432"
    volumes:
      - checkwise-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checkwise -d checkwise"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  checkwise-postgres-data:
