# Pinned dependency lock for the CheckWise backend (apps/api).
#
# WHY: pyproject.toml pins only floors (`>=`), so a fresh `pip install`
# on Render resolves whatever is latest at build time. On 2026-06-15 that
# drift (fastapi 0.137 lazy router inclusion) silently crash-looped the
# deploy for two days. This lock freezes the FULL transitive tree to the
# exact versions validated locally (full test suite green on this set),
# so every deploy installs byte-identical dependencies.
#
# HOW IT'S USED: render.yaml buildCommand runs
#   pip install -e . -c requirements.lock
# `-c` (constraints) caps versions without changing WHAT `-e .` installs.
#
# REGENERATE when changing deps in pyproject.toml:
#   python3.11 -m venv /tmp/lock && /tmp/lock/bin/pip install -e . \
#     && /tmp/lock/bin/pip freeze | grep -iv '^checkwise-backend==' \
#        > apps/api/requirements.lock
# then re-run the test suite against /tmp/lock before committing.
