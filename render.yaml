  # ──────────────────────────────────────────────────────────────────
  # Async-upload durability — stranded intake-receipt reconcile cron
  # ──────────────────────────────────────────────────────────────────
  #
  # The provider upload endpoint persists a ``recibido`` receipt and runs
  # the heavy validation pipeline in a FastAPI BackgroundTask. Those
  # tasks die on a worker restart — and Render redeploys the API on every
  # push to ``main`` — so a finalize task that was in flight during a
  # deploy would leave its receipt stuck at ``recibido`` forever.
  #
  # This cron runs ``scripts.run_intake_reconcile`` every 15 minutes and
  # re-finalizes any receipt still at ``recibido`` older than 5 minutes,
  # via the SAME idempotent background function (a receipt already moved
  # past ``recibido`` is skipped). The age cutoff keeps the sweep from
  # pre-empting a finalize task that is merely milliseconds into its
  # happy path.
  #
  # Env vars: needs DATABASE_URL AND the R2 storage creds, because it
  # re-reads the uploaded PDF bytes from durable storage (the request's
  # local temp file is long gone by the time this runs). STORAGE_BACKEND
  # is pinned to ``s3`` explicitly here — ``.env.production`` omits it and
  # the code default is ``local``, which would make the cron read from a
  # nonexistent local disk. All sourced from / matched to the
  # ``checkwise-api`` web service so the secrets stay paired with the API.
  - type: cron
    name: checkwise-intake-reconcile
    runtime: python
    plan: starter
    rootDir: apps/api
    branch: main
    schedule: "*/15 * * * *"
    buildCommand: pip install -e . -c requirements.lock
    command: python -m scripts.run_intake_reconcile
    envVars:
      - key: CHECKWISE_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromService:
          type: web
          name: checkwise-api
          envVarKey: DATABASE_URL
      - key: STORAGE_BACKEND
        value: s3
      - key: STORAGE_BUCKET
        value: checkwise-prod
      - key: AWS_REGION
        value: auto
      - key: AWS_S3_ENDPOINT
        fromService:
          type: web
          name: checkwise-api
          envVarKey: AWS_S3_ENDPOINT
      - key: AWS_ACCESS_KEY_ID
        fromService:
          type: web
          name: checkwise-api
          envVarKey: AWS_ACCESS_KEY_ID
      - key: AWS_SECRET_ACCESS_KEY
        fromService:
          type: web
          name: checkwise-api
          envVarKey: AWS_SECRET_ACCESS_KEY

  # ──────────────────────────────────────────────────────────────────
  # Phase 7 cutover Slice D — Periodic reporting reminder cron
  # ──────────────────────────────────────────────────────────────────
  #
  # Runs ``python -m scripts.run_reporting_dispatch`` once a day to
  # fire the five recurring-reporting threshold events from the new
  # notification fabric: ``reporting.window.opened``, ``due.t-7``,
  # ``due.t-1``, ``due.t-0``, ``overdue.t+3``.
  #
  # Walks the recurring REPSE calendar for each active workspace:
  # IMSS + SAT mensuales, INFONAVIT bimestral, SISUB/ICSOE
  # cuatrimestral, anual SAT. For each (workspace, requirement,
  # period_key) triple it checks whether a submission exists and
  # emits the appropriate threshold envelope via the unified
  # dispatcher in active mode (in-app + email + SMS via Twilio).
  #
  # Schedule: ``5 14 * * *`` (every day at 14:05 UTC) — five
  # minutes after the renewal cron so the two never compete for
  # the same DB connection on the starter plan. 14:05 UTC =
  # 08:05 America/Mexico_City year-round.
  #
  # Idempotency: the new path's ``notification_dispatch`` unique
  # constraint on (user_id, event_type, dedupe_key) makes any
  # replay a no-op. Catch-up emission semantics inside the
  # emitter handle missed days.
  #
  # Env vars: needs DATABASE_URL + TWILIO_* + SMTP_* + WHATSAPP_*
  # so the active dispatcher can actually fan out. Sourced from
  # the ``checkwise-api`` web service via ``fromService`` so the
  # secrets stay paired with the API.
  - type: cron
    name: checkwise-reporting-dispatch
    runtime: python
    plan: starter
    rootDir: apps/api
    branch: main
    schedule: "5 14 * * *"
    buildCommand: pip install -e . -c requirements.lock
    command: python -m scripts.run_reporting_dispatch
    envVars:
      - key: CHECKWISE_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromService:
          type: web
          name: checkwise-api
          envVarKey: DATABASE_URL
      - key: MESSAGING_ENABLED
        sync: false
      - key: TWILIO_ENABLED
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: WHATSAPP_ENABLED
        sync: false
      - key: WHATSAPP_NATIVE_TEMPLATES_ENABLED
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_API_VERSION
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false

  # ──────────────────────────────────────────────────────────────────
  # Phase B — demo lifecycle crons
  # ──────────────────────────────────────────────────────────────────
  #
  # Expiry freeze: flips demo orgs past their 14-day deadline to
  # status='frozen' (reversible by an admin upgrade). Runs at 14:30 UTC,
  # AFTER renewal (14:00) + reporting (14:05) so a freeze never races a
  # same-day notification (those crons also skip frozen orgs).
  - type: cron
    name: checkwise-demo-expiry-freeze
    runtime: python
    plan: starter
    rootDir: apps/api
    branch: main
    schedule: "30 14 * * *"
    buildCommand: pip install -e . -c requirements.lock
    command: python -m scripts.run_demo_expiry_freeze
    envVars:
      - key: CHECKWISE_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromService:
          type: web
          name: checkwise-api
          envVarKey: DATABASE_URL

  # Demo purge: IRREVERSIBLE hard-delete of demos frozen past the 30-day
  # grace window (tenant data + R2 blobs). Ships as a SAFE NO-OP — the
  # command has NO --apply and DEMO_PURGE_ENABLED=0, so it only LOGS
  # candidates. To enable deletion: add --apply to the command AND set
  # DEMO_PURGE_ENABLED=1 (snapshot the DB first).
  - type: cron
    name: checkwise-demo-purge
    runtime: python
    plan: starter
    rootDir: apps/api
    branch: main
    schedule: "0 16 * * *"
    buildCommand: pip install -e . -c requirements.lock
    command: python -m scripts.run_demo_purge
    envVars:
      - key: CHECKWISE_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DEMO_PURGE_ENABLED
        value: "0"
      - key: DATABASE_URL
        fromService:
          type: web
          name: checkwise-api
          envVarKey: DATABASE_URL
      - key: STORAGE_BACKEND
        value: s3
      - key: STORAGE_BUCKET
        value: checkwise-prod
      - key: AWS_REGION
        value: auto
      - key: AWS_S3_ENDPOINT
        fromService:
          type: web
          name: checkwise-api
          envVarKey: AWS_S3_ENDPOINT
      - key: AWS_ACCESS_KEY_ID
        fromService:
          type: web
          name: checkwise-api
          envVarKey: AWS_ACCESS_KEY_ID
      - key: AWS_SECRET_ACCESS_KEY
        fromService:
          type: web
          name: checkwise-api
          envVarKey: AWS_SECRET_ACCESS_KEY
