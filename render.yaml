# Render Blueprint — CheckWise backend
#
# Provisioning:
#   1. dashboard.render.com → New → Blueprint → pick this repo + branch.
#   2. Render reads this file, shows the service shape, and prompts for
#      the env vars with `sync: false` (the secret ones).
#   3. Paste DATABASE_URL + DIRECT_DATABASE_URL from Neon, R2 credentials
#      from Cloudflare, and a fresh AUTH_JWT_SECRET (openssl rand -hex 32).
#   4. Apply. First deploy runs `pip install` then `alembic upgrade head`
#      against DIRECT_DATABASE_URL, then starts uvicorn.
#
# Why this shape:
#   * runtime: python — Render has native Python support, no Dockerfile
#     needed. Uvicorn is a long-lived ASGI process, not a Lambda; that's
#     why we host it here instead of Vercel.
#   * rootDir: apps/api — the FastAPI app lives in /apps/api after the
#     2026-05-21 monorepo restructure; the frontend (/apps/web)
#     deploys to Vercel separately.
#   * preDeployCommand — runs migrations BEFORE traffic shifts to the
#     new instance. If migration fails, the new instance never goes
#     live and the old one keeps serving.
#   * healthCheckPath: /health — Render polls this to gate rollouts.
#
# Plan choice — `starter` ($7/mo) keeps the instance warm. The `free`
# tier spins down after 15 min idle and the first request after spin-up
# takes ~30s, which is acceptable for an early beta but not for users.

services:
  - type: web
    name: checkwise-api
    runtime: python
    plan: starter
    rootDir: apps/api
    branch: main
    autoDeploy: true
    buildCommand: pip install -e .
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # ---- Runtime ----
      - key: CHECKWISE_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11"

      # ---- Database (Neon) ----
      # DATABASE_URL points at the POOLED Neon endpoint (used at runtime).
      # DIRECT_DATABASE_URL points at the DIRECT endpoint (used by Alembic
      # — pooled endpoints don't support advisory locks).
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false

      # ---- CORS ----
      # Comma-separated list of allowed origins.
      # IMPORTANT: add your Vercel frontend URL(s) here before the frontend
      # goes live, e.g. https://checkwise.vercel.app,https://app.checkwise.mx
      # You can also override this key directly in the Render dashboard.
      - key: CORS_ORIGINS
        sync: false

      # ---- Storage (Cloudflare R2) ----
      - key: STORAGE_BACKEND
        value: s3
      - key: STORAGE_BUCKET
        value: checkwise-prod
      - key: AWS_S3_ENDPOINT
        sync: false        # https://<account_id>.r2.cloudflarestorage.com
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: auto

      # ---- Auth ----
      # 32+ char random secret. Generate with: openssl rand -hex 32
      - key: AUTH_JWT_SECRET
        sync: false

      # ---- Support links (optional; populate when finalized) ----
      - key: SUPPORT_WHATSAPP_URL
        sync: false

      # ---- Reports AI (Phase 3.3+) ----
      # ANTHROPIC_API_KEY powers the report planner + per-block content
      # generator + copilot chat. Without it, the backend silently falls
      # back to a deterministic mock LLM and "Generate with AI" emits
      # canned text. Paste the production key in the Render dashboard
      # — sync: false keeps the value out of this file.
      - key: ANTHROPIC_API_KEY
        sync: false
      # Optional override: "" (default = auto-detect from ANTHROPIC_API_KEY),
      # "anthropic" (force real, fail loudly if key missing), or "mock"
      # (force the deterministic mock even if a key is present — useful
      # to disable LLM cost while keeping the surface usable).
      - key: CHECKWISE_LLM_BACKEND
        sync: false

      # ---- Contact form delivery (P0-3) ----
      # Optional Slack incoming-webhook URL. When set, each new public
      # contact-form submission is also posted to this channel as a
      # background task. Persistence to the `contact_requests` table
      # happens regardless; empty value = persistence-only.
      - key: SLACK_CONTACT_WEBHOOK_URL
        sync: false

      # ---- Internal feedback delivery (Reportar launcher) ----
      # Both must be set for the in-app Reportar button (and its public
      # landing-page variant at /api/v1/feedback/public) to deliver to
      # Slack. Persistence to the `feedback_reports` table happens
      # regardless — when these are empty the row is created and
      # `slack_delivery_status` is set to 'skipped' so the triage UI at
      # /admin/feedback-reports doesn't show it stuck on 'pending'.
      #
      # Why a bot token here vs the webhook above: feedback reports
      # attach an optional PNG screenshot as a thread reply via
      # files.upload_v2, which incoming webhooks don't support. The
      # bot token must carry chat:write + files:write scopes, and the
      # bot must be /invited into the #checkwise-feedback channel
      # before the first delivery will succeed.
      #
      # SLACK_FEEDBACK_CHANNEL_ID is the channel ID (Cxxxxxxxxxx),
      # NOT the channel name — fetch it from Slack via "View channel
      # details" → bottom of the About tab.
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_FEEDBACK_CHANNEL_ID
        sync: false
