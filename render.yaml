# Render Blueprint — CheckWise backend
#
# Provisioning:
#   1. dashboard.render.com → New → Blueprint → pick this repo + branch.
#   2. Render reads this file, shows the service shape, and prompts for
#      the env vars with `sync: false` (the secret ones).
#   3. Paste DATABASE_URL + DIRECT_DATABASE_URL from Neon, R2 credentials
#      from Cloudflare, and a fresh AUTH_JWT_SECRET (openssl rand -hex 32).
#   4. Apply. First deploy runs `pip install` then `alembic upgrade head`
#      against DIRECT_DATABASE_URL, then starts uvicorn.
#
# Why this shape:
#   * runtime: python — Render has native Python support, no Dockerfile
#     needed. Uvicorn is a long-lived ASGI process, not a Lambda; that's
#     why we host it here instead of Vercel.
#   * rootDir: apps/api — the FastAPI app lives in /apps/api after the
#     2026-05-21 monorepo restructure; the frontend (/apps/web)
#     deploys to Vercel separately.
#   * preDeployCommand — runs migrations BEFORE traffic shifts to the
#     new instance. If migration fails, the new instance never goes
#     live and the old one keeps serving.
#   * healthCheckPath: /health — Render polls this to gate rollouts.
#
# Plan choice — `starter` ($7/mo) keeps the instance warm. The `free`
# tier spins down after 15 min idle and the first request after spin-up
# takes ~30s, which is acceptable for an early beta but not for users.

services:
  - type: web
    name: checkwise-api
    runtime: python
    plan: starter
    rootDir: apps/api
    branch: main
    autoDeploy: true
    # Phase 10B (2026-05-24) — appended `playwright install --with-deps
    # chromium` so the report-export PDF renderer has a browser to drive.
    # `--with-deps` installs Chromium's system fonts/libs via apt on
    # Render's Ubuntu base. Adds ~2-3 min to each deploy and ~200MB to
    # the slug; PDF rendering peaks ~150-300MB RAM per render which is
    # workable on starter (512MB) under normal traffic.
    # `-c requirements.lock` pins the full transitive dependency tree to
    # the exact versions validated locally. Without it, `pip install -e .`
    # resolves whatever is latest at build time — that drift (fastapi
    # 0.137 lazy router inclusion) silently crash-looped the deploy for
    # two days on 2026-06-15. Regenerate the lock per its header when
    # changing deps in pyproject.toml.
    buildCommand: pip install -e . -c requirements.lock && playwright install --with-deps chromium
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # ---- Runtime ----
      - key: CHECKWISE_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11"
      # Install Playwright's Chromium INTO the pip package location (0 = the
      # browsers live next to the playwright install) instead of a separate
      # ~/.cache the build writes but the runtime can't find. Without this,
      # the build's `playwright install` lands in a cache that doesn't
      # persist to the run container, the PDF renderer can't locate Chromium,
      # and Download PDF fails with "playwright install". Must be set for
      # BOTH build and runtime — Render env vars are. The renderer also
      # self-heals (installs on demand) if it's ever still missing.
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"

      # ---- Database (Neon) ----
      # DATABASE_URL points at the POOLED Neon endpoint (used at runtime).
      # DIRECT_DATABASE_URL points at the DIRECT endpoint (used by Alembic
      # — pooled endpoints don't support advisory locks).
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false

      # ---- CORS ----
      # Comma-separated list of allowed origins.
      # IMPORTANT: add your Vercel frontend URL(s) here before the frontend
      # goes live, e.g. https://checkwise.vercel.app,https://app.checkwise.mx
      # You can also override this key directly in the Render dashboard.
      - key: CORS_ORIGINS
        sync: false

      # ---- Storage (Cloudflare R2) ----
      - key: STORAGE_BACKEND
        value: s3
      - key: STORAGE_BUCKET
        value: checkwise-prod
      - key: AWS_S3_ENDPOINT
        sync: false        # https://<account_id>.r2.cloudflarestorage.com
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: auto

      # ---- Auth ----
      # 32+ char random secret. Generate with: openssl rand -hex 32
      # The API now refuses to boot if this is the in-code placeholder
      # (audit P4-01, 2026-05-25) — paste the real value before the
      # first deploy or the service will fail health checks.
      - key: AUTH_JWT_SECRET
        sync: false

      # ---- Rate limiting (shared limiter) ----
      # Optional but RECOMMENDED in production. When unset, the auth and
      # public-endpoint rate limiter falls back to per-process in-memory
      # state (the API logs a boot warning — see config.py). With more than
      # one web instance the effective ceiling is multiplied by the instance
      # count and resets on every redeploy, so the limit is best-effort, not
      # a hard global cap. Provision a Render Key Value (Redis) instance and
      # paste its connection URL here so the limiter is genuinely shared.
      # (Audit 2026-06-26.)
      - key: REDIS_URL
        sync: false

      # ---- Frontend base URL (audit P4-03, 2026-05-25) ----
      # The hostname every outbound transactional email links to —
      # password-reset CTAs, reviewer-decision notifications, renewal
      # reminders. Without this, email links default to the in-code
      # ``http://localhost:3000`` and break for any pilot user. Paste
      # the production hostname (e.g. https://app.checkwise.mx or the
      # current Vercel preview URL) in the Render dashboard.
      - key: FRONTEND_BASE_URL
        sync: false

      # ---- Transactional email (audit P4-02, 2026-05-25) ----
      # All four must be set for outbound email to leave the box.
      # When any are empty, ``send_*_email`` in
      # ``app/services/email_delivery.py`` short-circuits and writes
      # ``delivery_status="smtp_not_configured"`` to the audit row —
      # the row exists but no email leaves. SMTP_PORT defaults to 587
      # (STARTTLS); override only if the provider needs 465 (SSL) or
      # a custom port.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false

      # ---- Messaging (Phase 7 cutover — Twilio SMS + WhatsApp) ----
      # MESSAGING_ENABLED is the master gate; without it the unified
      # notification fanout in ``app/services/notifications/fanout.py``
      # marks every messaging dispatch row as
      # ``whatsapp_status="skipped"`` regardless of channel readiness.
      #
      # Twilio SMS is the active outbound channel today. Native
      # WhatsApp template delivery is gated on
      # WHATSAPP_NATIVE_TEMPLATES_ENABLED — flip ON only after Meta
      # APPROVES the templates in docs/runbooks/whatsapp_templates.json
      # AND WHATSAPP_ENABLED is true. While the native flag is off,
      # fanout passes ``whatsapp_components=None`` to send_message and
      # falls through to Twilio SMS with the rendered plaintext body.
      #
      # WHATSAPP_* keys are required separately for
      # ``POST /api/v1/me/phone-verification/issue``: that path calls
      # ``send_whatsapp_template`` directly (bypassing the fanout) and
      # needs Meta credentials to deliver the OTP. Without them the
      # row is created but the user never receives the code.
      - key: MESSAGING_ENABLED
        sync: false
      - key: TWILIO_ENABLED
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: WHATSAPP_ENABLED
        sync: false
      - key: WHATSAPP_NATIVE_TEMPLATES_ENABLED
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_API_VERSION
        sync: false

      # ---- Document AI / OCR (Phase 3 — scanned-PDF fallback) ----
      # OCR runs synchronously during intake when
      # ``inspect_pdf_with_ocr_fallback`` flags a scanned document.
      # Default OFF (``OCR_ENABLED=false``) — uploads without
      # extracted text route to ``pendiente_revision`` and the
      # extraction pipeline gracefully degrades.
      #
      # To enable: provision a Google Cloud project, enable the
      # Document AI API, create an Enterprise Document OCR processor,
      # mint a service account with ``documentai.editor``, export the
      # JSON key, paste its contents into
      # ``GOOGLE_APPLICATION_CREDENTIALS_JSON``. Full step-by-step:
      # apps/api/docs/PHASE3_DOCUMENTAI_SETUP.md.
      - key: OCR_ENABLED
        sync: false
      - key: GOOGLE_DOC_AI_PROJECT_ID
        sync: false
      - key: GOOGLE_DOC_AI_LOCATION
        sync: false
      - key: GOOGLE_DOC_AI_PROCESSOR_ID
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false

      # ---- Support links (optional; populate when finalized) ----
      - key: SUPPORT_WHATSAPP_URL
        sync: false

      # ---- Reports AI (Phase 3.3+) ----
      # ANTHROPIC_API_KEY powers the report planner + per-block content
      # generator + copilot chat. Without it, the backend silently falls
      # back to a deterministic mock LLM and "Generate with AI" emits
      # canned text. Paste the production key in the Render dashboard
      # — sync: false keeps the value out of this file.
      - key: ANTHROPIC_API_KEY
        sync: false
      # Optional override: "" (default = auto-detect from ANTHROPIC_API_KEY),
      # "anthropic" (force real, fail loudly if key missing), or "mock"
      # (force the deterministic mock even if a key is present — useful
      # to disable LLM cost while keeping the surface usable).
      - key: CHECKWISE_LLM_BACKEND
        sync: false

      # ---- Contact form delivery (P0-3) ----
      # Optional Slack incoming-webhook URL. When set, each new public
      # contact-form submission is also posted to this channel as a
      # background task. Persistence to the `contact_requests` table
      # happens regardless; empty value = persistence-only.
      - key: SLACK_CONTACT_WEBHOOK_URL
        sync: false

      # ---- Internal feedback delivery (Reportar launcher) ----
      # Both must be set for the in-app Reportar button (and its public
      # landing-page variant at /api/v1/feedback/public) to deliver to
      # Slack. Persistence to the `feedback_reports` table happens
      # regardless — when these are empty the row is created and
      # `slack_delivery_status` is set to 'skipped' so the triage UI at
      # /admin/feedback-reports doesn't show it stuck on 'pending'.
      #
      # Why a bot token here vs the webhook above: feedback reports
      # attach an optional PNG screenshot as a thread reply via
      # files.upload_v2, which incoming webhooks don't support. The
      # bot token must carry chat:write + files:write scopes, and the
      # bot must be /invited into the #checkwise-feedback channel
      # before the first delivery will succeed.
      #
      # SLACK_FEEDBACK_CHANNEL_ID is the channel ID (Cxxxxxxxxxx),
      # NOT the channel name — fetch it from Slack via "View channel
      # details" → bottom of the About tab.
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_FEEDBACK_CHANNEL_ID
        sync: false

      # ---- Provider correction-request delivery (Stage 2.7) ----
      # Optional Slack incoming-webhook URL for Tier-B correction
      # requests (contact email/phone/name changes from the workspace
      # context bar). Empty = audit-log persistence only. May reuse
      # the contact-form webhook or point at a dedicated channel.
      - key: SLACK_CORRECTION_WEBHOOK_URL
        sync: false

      # ---- Feature flags / kill switches (audit 2026-06-12) ----
      # Documented here so an operator can flip them from the Render
      # dashboard without reading the code. Full descriptions live in
      # .env.example. These are NOT secrets — explicit values keep a
      # Blueprint sync from prompting for input.
      #
      # Multi-file submissions (contract + anexos). Backend half of the
      # kill switch; the frontend dropzone is gated separately by
      # NEXT_PUBLIC_MULTI_FILE_UPLOAD_ENABLED on Vercel. Set BOTH to
      # false to roll the feature back without a deploy.
      - key: MULTI_FILE_UPLOAD_ENABLED
        value: "true"
      # Collapsed recurring catalog v2 — dark-shipped; v1 stays
      # authoritative while false.
      - key: RECURRING_CATALOG_V2
        value: "false"
      # Phase E auto-approve engine — ships DARK. Flip only per the
      # calibration procedure in .env.example (per-requirement-code
      # unlock backed by ≥99% measured precision).
      - key: AUTO_APPROVE_ENABLED
        value: "false"
      - key: AUTO_APPROVE_UNLOCKED_REQUIREMENT_CODES
        value: ""

      # ---- Tier A — AI/shadow-pipeline efficiency (activated 2026-06-24) ----
      # The "pure efficiency, lowest risk" tier from the pipeline-improvement
      # roadmap (merged via PR #40). All three are additive, advisory-path
      # only (they never change a user-visible verdict), got an adversarial
      # review, and are independently reversible — flip any back to "false"
      # and redeploy to roll it off. (Tier B activated below; B1 stays in
      # safe stub mode because LiveSATCFDIClient.consultar raises until the
      # real SAT call is wired + SAT ToS accepted.)
      #
      # A1 — skip the always-on Haiku triage on confidently-clean, born-digital,
      # non-high-stakes, never-analyzed intake (leaves shadow_* NULL =
      # reprocess-eligible; a 5% sample still runs triage to measure agreement).
      - key: DOCUMENT_ANALYSIS_TRIAGE_SKIP_ENABLED
        value: "true"
      # A2 — process-global Anthropic concurrency ceiling + circuit breaker
      # around messages.create (protective; 4xx-neutral, half-open bounded).
      - key: ANTHROPIC_CONCURRENCY_BREAKER_ENABLED
        value: "true"
      # A3 — AsyncAnthropic path so 30–90s LLM waits stop pinning the
      # threadpool (shadow analysis + intake finalize run async).
      - key: DOCUMENT_ANALYSIS_ASYNC_PROVIDER_ENABLED
        value: "true"

      # ---- Tier B (activated 2026-06-24) ----
      # B3 — coalesce per-document deep (Sonnet) escalations on a bundle into
      # the single cross-document expediente pass. Batching is INERT unless the
      # expediente pass itself is on, so both flags flip together. The
      # expediente pass is a real cross-document Sonnet call (cost), debounced
      # per workspace by DOCUMENT_ANALYSIS_EXPEDIENTE_DEBOUNCE_HOURS (default 6).
      # Both only do work where the AI shadow pipeline runs (DOCUMENT_ANALYSIS_
      # PROVIDER=anthropic + the pilot org gate, both set in the dashboard).
      - key: DOCUMENT_ANALYSIS_EXPEDIENTE_ENABLED
        value: "true"
      - key: DOCUMENT_ANALYSIS_BATCH_ESCALATION_ENABLED
        value: "true"
      # B1 — SAT CFDI folio verification. LIVE as of 2026-06-24: both gates are
      # cleared — LiveSATCFDIClient.consultar is implemented (PR #42) with the
      # SAT expresión (re/rr/tt) sourced from the CFDI's own QR (PR #43), and
      # SAT's ToS is legally accepted. The reviewer verify-folio endpoint now
      # performs the real SAT consulta. It is reviewer-triggered (never on the
      # intake path) and FAIL-OPEN: any transport/parse error or non-definitive
      # SAT answer → not_verifiable, which never changes a document. Rollback =
      # set SAT_CFDI_CLIENT_MODE back to "stub" and redeploy.
      - key: SAT_CFDI_VERIFICATION_ENABLED
        value: "true"
      - key: SAT_CFDI_CLIENT_MODE
        value: "live"

      # B2 — durable intake queue. When true the provider upload endpoint
      # ENQUEUES a durable intake_queue row instead of finalizing inline; the
      # checkwise-intake-consumer worker (below) drains it. MUST be true on BOTH
      # this web service (to enqueue) and the worker (to consume). The 15-min
      # checkwise-intake-reconcile cron backstops any receipt the worker misses.
      - key: INTAKE_QUEUE_CONSUMER_ENABLED
        value: "true"

  # ──────────────────────────────────────────────────────────────────
  # B2 — durable intake-queue consumer worker
  # ──────────────────────────────────────────────────────────────────
  #
  # Drains intake_queue by running the idempotent
  # finalize_intake_submission_background for each claimed job (FOR UPDATE SKIP
  # LOCKED → safe to scale to N replicas; a crash mid-finalize reclaims after
  # the visibility timeout). Its env MIRRORS checkwise-api so finalize behaves
  # identically off the web tier:
  #   * DB + R2  — re-reads the uploaded PDF bytes from durable storage.
  #   * AI/shadow config — or shadow analysis silently stops for ALL uploads.
  #   * messaging/SMTP   — or email/SMS verdict notifications silently stop
  #                        (in-app notifications are DB-only and survive).
  # Secrets come via fromService so they stay paired with the API; non-secret
  # flags duplicate the API's explicit values. buildCommand skips
  # ``playwright install`` (the consumer never renders PDFs). OCR env is
  # intentionally omitted (OCR runs at upload-inspection on the web tier and is
  # inert in prod) — add it here if OCR is ever enabled.
  - type: worker
    name: checkwise-intake-consumer
    runtime: python
    plan: starter
    rootDir: apps/api
    branch: main
    autoDeploy: true
    buildCommand: pip install -e . -c requirements.lock
    startCommand: python -m scripts.run_intake_queue_consumer
    envVars:
      - key: CHECKWISE_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11"
      # The consumer checks this on boot and exits if false — must be true.
      - key: INTAKE_QUEUE_CONSUMER_ENABLED
        value: "true"
      # ---- Database (pooled; the worker never runs alembic) ----
      - key: DATABASE_URL
        fromService:
          type: web
          name: checkwise-api
          envVarKey: DATABASE_URL
      # ---- Boot/link-signing secret (insurance; paired with the API) ----
      - key: AUTH_JWT_SECRET
        fromService:
          type: web
          name: checkwise-api
          envVarKey: AUTH_JWT_SECRET
      # ---- Storage (R2) — finalize re-reads the uploaded PDF bytes ----
      - key: STORAGE_BACKEND
        value: s3
      - key: STORAGE_BUCKET
        value: checkwise-prod
      - key: AWS_REGION
        value: auto
      - key: AWS_S3_ENDPOINT
        fromService:
          type: web
          name: checkwise-api
          envVarKey: AWS_S3_ENDPOINT
      - key: AWS_ACCESS_KEY_ID
        fromService:
          type: web
          name: checkwise-api
          envVarKey: AWS_ACCESS_KEY_ID
      - key: AWS_SECRET_ACCESS_KEY
        fromService:
          type: web
          name: checkwise-api
          envVarKey: AWS_SECRET_ACCESS_KEY
      # ---- AI / shadow analysis — match the web tier or analysis goes dark ----
      - key: ANTHROPIC_API_KEY
        fromService:
          type: web
          name: checkwise-api
          envVarKey: ANTHROPIC_API_KEY
      - key: CHECKWISE_LLM_BACKEND
        fromService:
          type: web
          name: checkwise-api
          envVarKey: CHECKWISE_LLM_BACKEND
      - key: DOCUMENT_ANALYSIS_PROVIDER
        fromService:
          type: web
          name: checkwise-api
          envVarKey: DOCUMENT_ANALYSIS_PROVIDER
      - key: DOCUMENT_ANALYSIS_PILOT_ORG_IDS
        fromService:
          type: web
          name: checkwise-api
          envVarKey: DOCUMENT_ANALYSIS_PILOT_ORG_IDS
      # ---- AI feature flags — duplicate the web service's explicit values ----
      - key: DOCUMENT_ANALYSIS_TRIAGE_SKIP_ENABLED
        value: "true"
      - key: ANTHROPIC_CONCURRENCY_BREAKER_ENABLED
        value: "true"
      - key: DOCUMENT_ANALYSIS_ASYNC_PROVIDER_ENABLED
        value: "true"
      - key: DOCUMENT_ANALYSIS_EXPEDIENTE_ENABLED
        value: "true"
      - key: DOCUMENT_ANALYSIS_BATCH_ESCALATION_ENABLED
        value: "true"
      # ---- Auto-approve runs inside finalize — match the web value ----
      - key: AUTO_APPROVE_ENABLED
        value: "false"
      - key: AUTO_APPROVE_UNLOCKED_REQUIREMENT_CODES
        value: ""
      # ---- Verdict notifications (in-app always; email/SMS need these) ----
      - key: FRONTEND_BASE_URL
        fromService:
          type: web
          name: checkwise-api
          envVarKey: FRONTEND_BASE_URL
      - key: MESSAGING_ENABLED
        fromService:
          type: web
          name: checkwise-api
          envVarKey: MESSAGING_ENABLED
      - key: TWILIO_ENABLED
        fromService:
          type: web
          name: checkwise-api
          envVarKey: TWILIO_ENABLED
      - key: TWILIO_ACCOUNT_SID
        fromService:
          type: web
          name: checkwise-api
          envVarKey: TWILIO_ACCOUNT_SID
      - key: TWILIO_AUTH_TOKEN
        fromService:
          type: web
          name: checkwise-api
          envVarKey: TWILIO_AUTH_TOKEN
      - key: TWILIO_FROM_NUMBER
        fromService:
          type: web
          name: checkwise-api
          envVarKey: TWILIO_FROM_NUMBER
      - key: WHATSAPP_ENABLED
        fromService:
          type: web
          name: checkwise-api
          envVarKey: WHATSAPP_ENABLED
      - key: WHATSAPP_NATIVE_TEMPLATES_ENABLED
        fromService:
          type: web
          name: checkwise-api
          envVarKey: WHATSAPP_NATIVE_TEMPLATES_ENABLED
      - key: WHATSAPP_ACCESS_TOKEN
        fromService:
          type: web
          name: checkwise-api
          envVarKey: WHATSAPP_ACCESS_TOKEN
      - key: WHATSAPP_PHONE_NUMBER_ID
        fromService:
          type: web
          name: checkwise-api
          envVarKey: WHATSAPP_PHONE_NUMBER_ID
      - key: WHATSAPP_API_VERSION
        fromService:
          type: web
          name: checkwise-api
          envVarKey: WHATSAPP_API_VERSION
      - key: SMTP_HOST
        fromService:
          type: web
          name: checkwise-api
          envVarKey: SMTP_HOST
      - key: SMTP_USERNAME
        fromService:
          type: web
          name: checkwise-api
          envVarKey: SMTP_USERNAME
      - key: SMTP_PASSWORD
        fromService:
          type: web
          name: checkwise-api
          envVarKey: SMTP_PASSWORD
      - key: SMTP_FROM_EMAIL
        fromService:
          type: web
          name: checkwise-api
          envVarKey: SMTP_FROM_EMAIL

  # ──────────────────────────────────────────────────────────────────
  # Phase 6 / Slice 6C — Renewal reminder cron
  # ──────────────────────────────────────────────────────────────────
  #
  # Runs ``python -m scripts.run_renewal_dispatch`` once a day. The
  # CLI walks every ProviderWorkspace, finds renewal-bearing onboarding
  # requirements (CSF 90d, REPSE 1095d, registro patronal 1095d),
  # computes the threshold crossings since the last successful run, and
  # inserts a ``renewal_reminders`` row + matching client + provider
  # notifications per new crossing. Idempotency comes from the unique
  # constraint on the reminders table — a repeat run on the same day
  # is a no-op.
  #
  # Schedule: ``0 14 * * *`` (every day at 14:00 UTC).
  #   14:00 UTC = 08:00 America/Mexico_City year-round (Mexico City
  #   dropped DST in 2022). Picked so first-hour-of-business in CDMX
  #   sees fresh notifications without paging anyone at night.
  #
  # If the cron misses a day, the catch-up semantics in
  # ``thresholds_crossed`` make the next run emit every threshold that
  # crossed in the missed interval — no thresholds get silently
  # dropped. Manual recovery: ``python -m scripts.run_renewal_dispatch
  # --today YYYY-MM-DD`` from a Render shell or local checkout against
  # the prod DATABASE_URL.
  #
  # Env vars: only DATABASE_URL is required (notifications + reminders
  # are pure DB writes). The cron does NOT need R2 / Anthropic / Slack
  # creds because it never touches storage, the LLM, or external
  # notification surfaces. DATABASE_URL is sourced from the existing
  # ``checkwise-api`` web service via ``fromService`` so we don't have
  # to re-paste the secret.
  - type: cron
    name: checkwise-renewal-dispatch
    runtime: python
    plan: starter
    rootDir: apps/api
    branch: main
    schedule: "0 14 * * *"
    buildCommand: pip install -e . -c requirements.lock
    command: python -m scripts.run_renewal_dispatch
    envVars:
      - key: CHECKWISE_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromService:
          type: web
          name: checkwise-api
          envVarKey: DATABASE_URL
      # Phase 7 cutover Slice C — the renewal CLI now also fires
      # the unified-fabric emitter in active mode alongside the
      # legacy dispatcher. The active path needs Twilio + SMTP to
      # actually fan out; without these, the new path degrades
      # gracefully to skipped+audited rows.
      #
      # WHATSAPP_* keys are wired here so the cron is ready the
      # moment WHATSAPP_NATIVE_TEMPLATES_ENABLED flips ON across
      # services — see the web service messaging block above for the
      # full Twilio-SMS-first-then-native-templates story.
      - key: MESSAGING_ENABLED
        sync: false
      - key: TWILIO_ENABLED
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
